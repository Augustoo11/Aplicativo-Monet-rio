spring.application.name=GestorFin

# -------------------------------------------------------
# CONEXÃO COM O BANCO DE DADOS (Aiven)
# -------------------------------------------------------

# ✅ URL correta — sem a senha no meio, e com o nome do banco "defaultdb"
spring.datasource.url=jdbc:mysql://gestorfin-pcgamer2207-21c9.c.aivencloud.com:20863/defaultdb?sslMode=REQUIRED&serverTimezone=America/Sao_Paulo

# Usuário do banco
spring.datasource.username=avnadmin

# ✅ Senha diretamente aqui (mais simples para iniciante)
# Cole a senha real que aparece nas credenciais do Aiven
spring.datasource.password=db password

# Driver do MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------
# CONFIGURAÇÃO DO JPA
# -------------------------------------------------------

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true